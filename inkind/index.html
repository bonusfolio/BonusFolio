<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting to InKind...</title>

  <!-- Instant meta-refresh -->
  <meta http-equiv="refresh" content="0; url=https://app.inkind.com/refer/4EI6HAS6" />

  <!-- Prevent indexing of redirect pages -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Canonical points to the target -->
  <link rel="canonical" href="https://app.inkind.com/refer/4EI6HAS6" />

  <script>
    // JS fallback that uses replace to avoid creating a history entry
    (function(){
      var target = "https://app.inkind.com/refer/4EI6HAS6";
      try {
        if (window && window.location && window.location.replace) {
          window.location.replace(target);
        } else {
          window.location.href = target;
        }
      } catch(e) {
        // ignore
      }
    })();
  </script>

  <style>
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111}
    .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;box-sizing:border-box}
    .msg{font-size:18px;margin-bottom:12px;text-align:center}
    .btn{display:inline-block;padding:10px 16px;background:#0b72ff;color:#fff;border-radius:6px;text-decoration:none;font-weight:600}
    .small{color:#666;margin-top:12px;font-size:0.95rem;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Optional: add a logo file at ../images/inkind.png if you use logos -->
    <img src="../images/inkind.png" alt="InKind logo" style="max-width:200px;margin-bottom:18px" onerror="this.style.display='none'">
    <div class="msg">Redirecting to InKind — please wait.</div>
    <a class="btn" href="https://app.inkind.com/refer/4EI6HAS6">Click here if you are not redirected</a>
    <div class="small">If the redirect doesn't work, open this URL directly: <br>
      <a href="https://app.inkind.com/refer/4EI6HAS6">https://app.inkind.com/refer/4EI6HAS6</a>
    </div>
  </div>
</body>
