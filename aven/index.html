<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Aven Signup Bonus</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
font-family:Arial;
background:#f5f7fb;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
max-width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.code{
font-size:22px;
font-weight:bold;
background:#eef2ff;
padding:10px;
border-radius:8px;
margin:15px 0;
}

button{
padding:10px 18px;
font-size:16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

.open{
display:block;
margin-top:15px;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h2>Aven $5 Signup Bonus</h2>

<p>Copy this code when signing up:</p>

<div class="code" id="code">
FG2544PWMN
</div>

<button onclick="copyCode()">
Copy Code
</button>

<a class="open" href="https://aven.com/advisor" target="_blank">
Open Aven Signup
</a>

<p style="margin-top:15px;font-size:13px;">
Paste the code during signup to get the bonus.
</p>

</div>

<script>
function copyCode(){
navigator.clipboard.writeText("FG2544PWMN");
alert("Code copied!");
}
</script>

</body>
