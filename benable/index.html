<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Benable — Signup Bonus</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{font-family:Arial,system-ui;margin:0;background:#f5f7fb;display:flex;align-items:center;justify-content:center;height:100vh}
  .card{background:#fff;padding:26px;border-radius:12px;max-width:440px;box-shadow:0 8px 30px rgba(0,0,0,0.06);text-align:center}
  .code{background:#eef2ff;padding:10px 14px;border-radius:8px;font-weight:700;margin:12px 0;display:inline-block}
  .btn{display:block;margin:12px auto 0;padding:12px 18px;border-radius:8px;background:#2563eb;color:#fff;text-decoration:none;font-weight:700}
  .muted{font-size:13px;color:#444;margin-top:10px;text-align:left}
</style>
</head>
<body>
  <div class="card">
    <h2>Benable — Get paid to post</h2>
    <p>Share your favorite things and earn with brands.</p>

    <p>Referral code (for reference):</p>
    <div class="code" id="code">44RHG</div>
    <button onclick="copyCode()" style="margin-top:6px;padding:10px 14px;border-radius:8px;background:#10a37f;color:#fff;border:none;font-weight:700;cursor:pointer">Copy Code</button>

    <a class="btn" href="https://benable.com/i/44RHG" target="_blank" rel="noopener noreferrer">Go to Benable</a>

    <div class="muted">
      <strong>How to use:</strong><br>
      1) Click “Go to Benable” or copy the code.<br>
      2) Sign up and enter the code if asked.<br>
      3) Start posting & earning.
    </div>
  </div>

<script>
function copyCode(){
  navigator.clipboard.writeText(document.getElementById('code').innerText.trim())
  .then(()=> alert('Code copied: 44RHG'))
  .catch(()=> alert('Copy failed — select and copy manually.'));
}
</script>
</body>
</html>
